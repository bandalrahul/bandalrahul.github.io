name: Daily Swift Blog Post

on:
  schedule:
    # Runs every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-daily-post:
    runs-on: macos-14
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r automation/requirements.txt

      - name: Generate Swift/iOS article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python automation/generate_article.py

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build and generate site
        run: swift run PublishSBR

      - name: Generate social preview images
        run: |
          brew install cairo
          python automation/generate_social_images.py

      - name: Deploy site to GitHub Pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Output
          branch: master
          single-commit: true
          clean: true

      - name: Commit generated article to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Content/posts automation/published-topics.json
          if git diff --staged --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Auto-publish: daily Swift/iOS article $(date +'%Y-%m-%d')"
          git push origin main

      - name: Cross-post to Dev.to
        continue-on-error: true
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: python automation/post_to_devto.py

      - name: Commit Dev.to publish record
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/devto-published.json
          if git diff --staged --quiet; then
            echo "No Dev.to record to commit."
            exit 0
          fi
          git commit -m "Track Dev.to cross-post $(date +'%Y-%m-%d')"
          git push origin main

      - name: Share latest article on Facebook
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python automation/post_to_facebook.py

      - name: Commit Facebook publish record
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/facebook-published.json
          if git diff --staged --quiet; then
            echo "No Facebook record to commit."
            exit 0
          fi
          git commit -m "Track Facebook share $(date +'%Y-%m-%d')"
          git push origin main
